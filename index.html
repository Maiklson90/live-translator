<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Bypass Překladač</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100vh;
            background-color: transparent !important;
            overflow: hidden; font-family: 'Arial', sans-serif;
        }
        #widget {
            width: 100%; height: 100%; display: flex;
            justify-content: center; align-items: flex-end;
            padding-bottom: 60px; box-sizing: border-box; cursor: pointer;
        }
        #output-text {
            font-size: 36px; font-weight: 800; color: #ffffff;
            -webkit-text-stroke: 2px #000000;
            text-shadow: 0px 4px 8px rgba(0, 0, 0, 0.7);
            text-align: center; width: 90%; margin: 0;
            transition: opacity 0.4s ease;
        }
    </style>
</head>
<body>

    <div id="widget">
        <p id="output-text">KLIKNI SEM PRO START...</p>
    </div>

    <script>
        const textEl = document.getElementById('output-text');
        let isRunning = false;

        // TENTO SKRIPT SE SPUSTÍ VE VIRTUÁLNÍM PROSTŘEDÍ
        const workerCode = `
            let recognition;
            let fadeTimeout;

            window.addEventListener('message', async (e) => {
                if (e.data.type === 'START') {
                    try {
                        // Vynucení audio kontextu
                        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        
                        // Přímý pokus o vyvolání systémového okna pro mikrofon
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        
                        const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
                        recognition = new SpeechRecognition();
                        recognition.lang = 'sk-SK';
                        recognition.continuous = true;
                        recognition.interimResults = true;

                        recognition.onresult = async (event) => {
                            let interim = ''; let final = '';
                            for (let i = event.resultIndex; i < event.results.length; ++i) {
                                if (event.results[i].isFinal) final += event.results[i][0].transcript;
                                else interim += event.results[i][0].transcript;
                            }
                            const text = final || interim;
                            if (text.trim()) {
                                // Překlad
                                const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=sk&tl=en&dt=t&q=' + encodeURIComponent(text);
                                const res = await fetch(url);
                                const data = await res.json();
                                const trans = data[0].map(item => item[0]).join('');
                                window.parent.postMessage({ type: 'TEXT', val: trans }, '*');
                            }
                        };

                        recognition.onend = () => { recognition.start(); };
                        recognition.onerror = (err) => { 
                            window.parent.postMessage({ type: 'ERROR', val: err.error }, '*'); 
                        };

                        recognition.start();
                        window.parent.postMessage({ type: 'READY' }, '*');

                    } catch (err) {
                        window.parent.postMessage({ type: 'ERROR', val: err.message }, '*');
                    }
                }
            });
        `;

        // Spuštění triku s iFramem v reálném čase, aby si OBS myslelo, že je to externí web
        document.getElementById('widget').addEventListener('click', () => {
            if (isRunning) return;
            isRunning = true;
            textEl.innerText = "Spouštím bezpečné audio rozhraní...";

            const blob = new Blob([`
                <!DOCTYPE html>
                <html>
                <body>
                <script>${workerCode}<\/script>
                </body>
                </html>
            `], { type: 'text/html' });
            
            const iframe = document.createElement('iframe');
            iframe.src = URL.createObjectURL(blob);
            iframe.style.display = 'none';
            // Natvrdo aplikujeme povolení mikrofonu pro tento virtuální iFrame
            iframe.setAttribute('allow', 'microphone'); 
            document.body.appendChild(iframe);

            iframe.onload = () => {
                iframe.contentWindow.postMessage({ type: 'START' }, '*');
            };
        });

        // Naslouchání odpovědí z virtuálního rozhraní
        window.addEventListener('message', (e) => {
            if (e.data.type === 'READY') {
                textEl.innerText = "Naslouchám... Mluv slovensky.";
                setTimeout(() => { textEl.style.opacity = '0'; }, 3000);
            }
            if (e.data.type === 'TEXT') {
                textEl.innerText = e.data.val;
                textEl.style.opacity = '1';
                clearTimeout(window.fade);
                window.fade = setTimeout(() => { textEl.style.opacity = '0'; }, 3000);
            }
            if (e.data.type === 'ERROR') {
                textEl.innerText = "Chyba systému: " + e.data.val + " (Zkontroluj ikonu mikrofonu u hodin ve Windows!)";
                textEl.style.opacity = '1';
                isRunning = false;
            }
        });
    </script>
</body>
</html>

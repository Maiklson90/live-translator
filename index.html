<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Live Translator - GitHub Seamless</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            /* Průhledné pozadí pro čisté vložení do OBS */
            background-color: transparent !important; 
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        #translator-widget {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Text dole */
            align-items: center;
            box-sizing: border-box;
            padding-bottom: 60px;
            cursor: pointer;
        }

        #text-container {
            width: 90%;
            text-align: center;
        }

        #output-text {
            font-size: 36px;
            font-weight: 800;
            color: #ffffff; /* Bílé písmo */
            
            /* Nový vyhlazený černý obrys bez kostiček */
            -webkit-text-stroke: 2px #000000; 
            text-shadow: 0px 4px 8px rgba(0, 0, 0, 0.7);
            
            margin: 0;
            opacity: 1;
            transition: opacity 0.4s ease-in-out;
        }
    </style>
</head>
<body>

    <div id="translator-widget">
        <div id="text-container">
            <p id="output-text">Klikni sem přes 'Interagovat' pro spuštění překladu...</p>
        </div>
    </div>

    <script>
        const widgetContainer = document.getElementById('translator-widget');
        const outputText = document.getElementById('output-text');

        let recognition;
        let fadeTimeout;
        let isRunning = false;

        function startFadeTimeout() {
            clearTimeout(fadeTimeout);
            fadeTimeout = setTimeout(() => {
                outputText.style.opacity = '0';
            }, 3000); // Zmizne po 3 sekundách ticha
        }

        async function fetchTranslation(text) {
            if (!text.trim()) return null;
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=sk&tl=en&dt=t&q=${encodeURIComponent(text)}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                return data[0].map(item => item[0]).join('');
            } catch (e) {
                console.error(e);
                return null;
            }
        }

        async function startWidget() {
            if (isRunning) return; 

            outputText.innerText = "Inicializace mikrofonu...";

            try {
                // Požádáme o mikrofon (GitHub má zelenou, hned to projde)
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
                
                if (!SpeechRecognition) {
                    outputText.innerText = "Chyba: Prohlížeč nepodporuje řečové API.";
                    return;
                }

                recognition = new SpeechRecognition();
                recognition.lang = 'sk-SK';
                recognition.continuous = true;
                recognition.interimResults = true; // Píše ihned, nečeká na konec věty

                recognition.onresult = async (event) => {
                    let interimTranscript = '';
                    let finalTranscript = '';

                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            finalTranscript += event.results[i][0].transcript;
                        } else {
                            interimTranscript += event.results[i][0].transcript;
                        }
                    }

                    const textToTranslate = finalTranscript || interimTranscript;

                    if (textToTranslate.trim().length > 0) {
                        const translatedEnglish = await fetchTranslation(textToTranslate);
                        if (translatedEnglish) {
                            outputText.innerText = translatedEnglish;
                            outputText.style.opacity = '1';
                            startFadeTimeout();
                        }
                    }
                };

                recognition.onend = () => {
                    if (isRunning) {
                        setTimeout(() => {
                            try { recognition.start(); } catch(e) {}
                        }, 400);
                    }
                };

                recognition.onerror = (event) => {
                    console.error(event.error);
                    if (event.error === 'not-allowed') {
                        outputText.innerText = "Chyba: Povol mikrofon v zámečku v Chrome!";
                        isRunning = false;
                    }
                };

                recognition.start();
                isRunning = true;
                outputText.innerText = "Naslouchám... Mluv slovensky.";
                startFadeTimeout();

            } catch (err) {
                outputText.innerText = "Chyba: Prohlížeč odmítl audio stream.";
            }
        }

        widgetContainer.addEventListener('click', startWidget);
    </script>
</body>
</html>

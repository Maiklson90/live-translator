<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>VYSÍLAČ - Ruční zadání kódu</title>
    <style>
        body { background: #111; color: white; font-family: Arial, sans-serif; text-align: center; padding-top: 50px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #00ff00; border: none; font-weight: bold; border-radius: 5px; margin-top: 15px; }
        input { padding: 12px; font-size: 16px; width: 300px; text-align: center; border-radius: 5px; border: 1px solid #555; background: #222; color: white; }
        #status { margin-top: 20px; font-size: 20px; color: #bbb; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <h1>Překladač pro Kickbot widget</h1>
    <p>Zadej přesný zelený kód, který ti aktuálně svítí v OBS/Kickbotu:</p>
    <input type="text" id="obs-code" placeholder="Chrimsie3003-prijimac-XXXX"><br>
    <button id="start-btn">SPUSTIT A PROPOJIT</button>
    <div id="status">Stav: Čekám na zadání kódu...</div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const codeInput = document.getElementById('obs-code');
        const statusEl = document.getElementById('status');
        let peer = new Peer(); let conn; let recognition; let isRunning = false;

        async function fetchTranslation(text) {
            if (!text.trim()) return null;
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=sk&tl=en&dt=t&q=${encodeURIComponent(text)}`;
            try {
                const response = await fetch(url); const data = await response.json();
                return data[0].map(item => item[0]).join('');
            } catch (e) { return null; }
        }

        startBtn.addEventListener('click', () => {
            const targetId = codeInput.value.trim();
            if (!targetId) { alert("Nejdřív musíš opsat kód ze screenu!"); return; }
            statusEl.innerText = "Připojuji se...";
            
            conn = peer.connect(targetId);
            conn.on('open', () => {
                statusEl.innerText = "Stav: SPOJENO! Můžeš minimalizovat Chrome.";
                startRecording();
            });
        });

        function startRecording() {
            isRunning = true; startBtn.style.display = 'none'; codeInput.style.display = 'none';
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SR(); recognition.lang = 'sk-SK'; recognition.continuous = true; recognition.interimResults = true;
            recognition.onresult = async (event) => {
                let interim = ''; let final = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) final += event.results[i][0].transcript;
                    else interim += event.results[i][0].transcript;
                }
                const text = final || interim;
                if (text.trim().length > 0) {
                    const trans = await fetchTranslation(text);
                    if (trans && conn && conn.open) { conn.send(trans); }
                }
            };
            recognition.onend = () => { if (isRunning) setTimeout(() => { try { recognition.start(); } catch(e){} }, 400); };
            recognition.start();
        }
    </script>
</body>
</html>

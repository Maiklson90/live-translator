<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>VYSÍLAČ - Překladač na pozadí</title>
    <style>
        body { background: #111; color: white; font-family: Arial, sans-serif; text-align: center; padding-top: 50px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #00ff00; border: none; font-weight: bold; border-radius: 5px; }
        #status { margin-top: 20px; font-size: 20px; color: #bbb; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <h1>Překladač pro OBS (Ovládací okno)</h1>
    <p>Po kliknutí na tlačítko můžeš toto okno minimalizovat na lištu.</p>
    <button id="start-btn">SPUSTIT NASLOUCHÁNÍ</button>
    <div id="status">Stav: Čekám na spuštění...</div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const statusEl = document.getElementById('status');
        
        let peer;
        let conn;
        let recognition;
        let isRunning = false;

        // Inicializace spojení s OBS widgetem
        // Použijeme fixní ID, aby se okna vždy našla
        peer = new Peer('moje-unikatni-id-prekladace-vysilac');

        peer.on('open', (id) => {
            statusEl.innerText = "Stav: Systém připraven. Klikni na Spustit.";
        });

        // Pokus o připojení k OBS (přijímači)
        function connectToOBS() {
            conn = peer.connect('Chrimsie-3003-Maiklson');
            conn.on('open', () => {
                statusEl.innerText = "Stav: Spojeno s OBS! Můžeš minimalizovat okno.";
            });
            conn.on('close', () => {
                statusEl.innerText = "Stav: OBS odpojeno, zkouším se znovu spojit...";
                setTimeout(connectToOBS, 2000);
            });
        }

        async function fetchTranslation(text) {
            if (!text.trim()) return null;
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=sk&tl=en&dt=t&q=${encodeURIComponent(text)}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                return data[0].map(item => item[0]).join('');
            } catch (e) { return null; }
        }

        startBtn.addEventListener('click', () => {
            if (isRunning) return;
            isRunning = true;
            startBtn.style.display = 'none';
            statusEl.innerText = "Připojuji se k OBS...";
            
            connectToOBS();

            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SR();
            recognition.lang = 'sk-SK';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = async (event) => {
                let interim = ''; let final = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) final += event.results[i][0].transcript;
                    else interim += event.results[i][0].transcript;
                }
                
                const text = final || interim;
                if (text.trim().length > 0) {
                    const trans = await fetchTranslation(text);
                    if (trans && conn && conn.open) {
                        // POŠLEME TEXT PŘES INTERNET DO OBS
                        conn.send(trans);
                    }
                }
            };

            recognition.onend = () => {
                if (isRunning) setTimeout(() => { try { recognition.start(); } catch(e){} }, 400);
            };

            recognition.start();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>HLAVNÍ VYSÍLAČ</title>
    <style>
        body { background: #111; color: white; font-family: Arial, sans-serif; text-align: center; padding-top: 50px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #00ff00; border: none; font-weight: bold; border-radius: 5px; margin-top: 15px; }
        #status { margin-top: 20px; font-size: 20px; color: #bbb; }
        #connected-widgets { margin-top: 15px; color: #00ff00; font-weight: bold; font-size: 18px; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <h1>Hlasový Vysílač (Server)</h1>
    <p>Tento panel vysílá překlad přímo do tvého OBS.</p>
    <p>!! POZOR !!
    Mute v OBS nevypne překlad, pro soukromí musíš ztlumit mikrofon přímo ve Windows nebo na zařízení.</p>
    <button id="start-btn">SPUSTIT MIKROFON</button>
    <div id="status">Stav: Inicializace systému...</div>
    <div id="connected-widgets">Připojené OBS: 0</div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const statusEl = document.getElementById('status');
        const widgetsEl = document.getElementById('connected-widgets');
        
        let peer; let connectedClients = []; let recognition; let isRunning = false;

        peer = new Peer('Chrimsie-Hlavni-Vysilac-Server');

        peer.on('open', () => { statusEl.innerText = "Stav: Připraven. Klikni na zelené tlačítko."; });
        peer.on('connection', (conn) => {
            connectedClients.push(conn); updateWidgetCount();
            conn.on('close', () => { connectedClients = connectedClients.filter(c => c !== conn); updateWidgetCount(); });
        });

        function updateWidgetCount() { widgetsEl.innerText = `Připojená OBS okna: ${connectedClients.length}`; }

        async function fetchTranslation(text) {
            if (!text.trim()) return null;
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=sk&tl=en&dt=t&q=${encodeURIComponent(text)}`;
            try {
                const response = await fetch(url); const data = await response.json();
                return data[0].map(item => item[0]).join('');
            } catch (e) { return null; }
        }

        startBtn.addEventListener('click', () => {
            if (isRunning) return; isRunning = true; startBtn.style.display = 'none';
            statusEl.innerText = "Stav: MIKROFON AKTIVNÍ! Text se posílá do OBS.";
            startRecording();
        });

        function startRecording() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SR();
            recognition.lang = 'sk-SK';
            recognition.continuous = true;
            
            // VRÁCENO NA FALSE: Žádné blikání textu po písmenech
            recognition.interimResults = false; 

            recognition.onresult = async (event) => {
                let finalBlock = '';
                
                // Klasický bezpečný cyklus z tvé první verze kódu
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalBlock += event.results[i][0].transcript;
                    }
                }
                
                // Jakmile má Google ucelenou frázi/větu hotovou, hned letí do OBS
                if (finalBlock.trim().length > 0) {
                    const trans = await fetchTranslation(finalBlock);
                    if (trans) {
                        connectedClients.forEach(conn => {
                            if (conn.open) conn.send(trans);
                        });
                    }
                }
            };

            recognition.onend = () => {
                if (isRunning) setTimeout(() => { try { recognition.start(); } catch(e){} }, 400);
            };

            recognition.start();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>HLAVNÍ VYSÍLAČ</title>
    <style>
        body { background: #111; color: white; font-family: Arial, sans-serif; text-align: center; padding-top: 50px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; font-weight: bold; border-radius: 5px; margin-top: 15px; transition: background 0.2s ease; }
        .btn-start { background: #00ff00; color: black; }
        .btn-stop { background: #ff0000; color: white; }
        #status { margin-top: 20px; font-size: 20px; color: #bbb; }
        #connected-widgets { margin-top: 15px; font-weight: bold; font-size: 18px; }
        .status-ano { color: #00ff00; }
        .status-ne { color: #ff0000; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <h1>Hlasový Vysílač (Server)</h1>
    <p>Tento panel vysílá překlad přímo do tvého OBS.</p>
    <p>!! POZOR !! Mute v OBS nevypne překlad, pro soukromí musíš ztlumit mikrofon přímo ve Windows nebo zde.</p>
    <button id="start-btn" class="btn-start">SPUSTIT MIKROFON</button>
    <div id="status">Stav: Inicializace systému...</div>
    
    <div id="connected-widgets">Spojeno s OBS: <span id="yes-no-status" class="status-ne">NE</span></div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const statusEl = document.getElementById('status');
        const widgetsEl = document.getElementById('yes-no-status');
        
        let peer; let connectedClients = []; let recognition; let isRunning = false;

        peer = new Peer('Chrimsie-Hlavni-Vysilac-Server');

        peer.on('open', () => { statusEl.innerText = "Stav: Připraven. Klikni na zelené tlačítko."; });
        
        peer.on('connection', (conn) => {
            connectedClients.push(conn);
            updateWidgetStatus();

            conn.on('close', () => {
                connectedClients = connectedClients.filter(c => c !== conn);
                updateWidgetStatus();
            });
        });

        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                statusEl.innerText = "Chyba: Panel už máš otevřený jinde!";
                statusEl.style.color = "red";
            }
        });

        function updateWidgetStatus() {
            if (connectedClients.length > 0) {
                widgetsEl.innerText = "ANO";
                widgetsEl.className = "status-ano";
            } else {
                widgetsEl.innerText = "NE";
                widgetsEl.className = "status-ne";
            }
        }

        async function fetchTranslation(text) {
            if (!text.trim()) return null;
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=sk&tl=en&dt=t&q=${encodeURIComponent(text)}`;
            try {
                const response = await fetch(url); const data = await response.json();
                return data[0].map(item => item[0]).join('');
            } catch (e) { return null; }
        }

        startBtn.addEventListener('click', () => {
            if (!isRunning) {
                isRunning = true;
                startBtn.innerText = "ZASTAVIT MIKROFON (MUTE)";
                startBtn.className = "btn-stop";
                statusEl.innerText = "Stav: MIKROFON AKTIVNÍ! Text se posílá do OBS.";
                startRecording();
            } else {
                isRunning = false;
                startBtn.innerText = "SPUSTIT MIKROFON";
                startBtn.className = "btn-start";
                statusEl.innerText = "Stav: MIKROFON VYPNUTÝ (MUTE). Do OBS se nic neposílá.";
                if (recognition) recognition.stop();
            }
        });

        function startRecording() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SR(); recognition.lang = 'sk-SK'; recognition.continuous = true; 
            
            // Vypneme průběžné blikání, počkáme na ucelenou větu
            recognition.interimResults = false; 

            recognition.onresult = async (event) => {
                if (!isRunning) return;
                let finalBlock = '';
                
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalBlock += event.results[i][0].transcript;
                    }
                }
                
                if (finalBlock.trim().length > 0) {
                    const trans = await fetchTranslation(finalBlock);
                    if (trans && isRunning) {
                        connectedClients.forEach(conn => { if (conn.open) conn.send(trans); });
                    }
                }
            };
            
            recognition.onend = () => { if (isRunning) setTimeout(() => { try { recognition.start(); } catch(e){} }, 400); };
            recognition.start();
        }
    </script>
</body>
</html>
